name: Publish

# Publishes all library artifacts to Maven Central (Central Portal) when a
# version tag is pushed, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# The upload is *staged* — the release is finished manually in the Central
# Portal (matches `publishToMavenCentral()` in PublishingConventionPlugin.kt).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      # The git tag is the source of truth for the release version. Fail loudly if it
      # doesn't match VERSION_NAME in gradle.properties — otherwise a `vX.Y.Z` tag would
      # silently publish whatever stale version the repo still declares (and Maven Central
      # forbids re-publishing an already-released version). Bump VERSION_NAME to match the
      # tag in the release commit before tagging.
      - name: Verify tag matches VERSION_NAME
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROP_VERSION="$(grep -E '^VERSION_NAME=' gradle.properties | cut -d= -f2)"
          if [ "$TAG_VERSION" != "$PROP_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match VERSION_NAME=$PROP_VERSION in gradle.properties. Bump VERSION_NAME to match the tag before releasing."
            exit 1
          fi
          echo "Releasing version $PROP_VERSION (tag v$TAG_VERSION)."

      - name: Publish to Maven Central (staged)
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

  # Creates the GitHub Release for the pushed tag, using that version's section
  # of CHANGELOG.md as the release notes (falling back to auto-generated notes
  # if the section is missing). Runs only after the Maven Central staging
  # succeeded, so a failed publish never gets an orphan Release.
  github-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && (/^## \[/ || /^\[[^]]+\]: /) {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md section for $VERSION; falling back to auto-generated notes."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
