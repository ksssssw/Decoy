name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

# Least privilege — CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves Actions minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Unit tests (all modules)
        run: ./gradlew test --continue

      - name: Assemble debug & release
        run: ./gradlew :app:assembleDebug :app:assembleRelease

      # The security model relies on the debug/release dependency swap — fail the
      # build if inspector code ever leaks into the release APK (see README §Security).
      - name: Verify release APK contains no inspector code
        run: |
          APK=$(ls app/build/outputs/apk/release/app-release*.apk | head -1)
          unzip -o -q "$APK" "classes*.dex" -d dexout
          DEXDUMP="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/dexdump"
          LEAKED=$(for d in dexout/classes*.dex; do "$DEXDUMP" "$d" | grep "Class descriptor"; done \
            | grep -E "Lcom/decoy/android/|Lio/ktor/server/" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Inspector classes leaked into the release APK:"
            echo "$LEAKED"
            exit 1
          fi
          echo "Release APK is clean — no inspector/server classes."

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests'
