version: 2
updates:
  # Gradle dependencies (reads the version catalog at gradle/libs.versions.toml).
  # Target `develop`: main is release-only, integration happens on develop.
  - package-ecosystem: gradle
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
